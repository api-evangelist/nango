specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Nango
providerId: nango
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Integrations
description: Nango proxy and management APIs rate-limited per workspace.
sources:
  - https://www.nango.dev/pricing
  - https://docs.nango.dev/reference/api/rate-limits
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Management API
    scope: workspace
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
  - name: Proxy API
    scope: workspace
    metric: requests_per_minute
    limit: tier-based (100k-1M/mo)
  - name: Concurrent syncs
    scope: workspace
    metric: concurrent
    limit: tier-based
