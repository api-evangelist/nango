description: >-
  Nango.dev is a developer infrastructure platform that simplifies building
  product integrations with external APIs. It provides the infrastructure to
  build reliable, scalable integrations fast, including API authentication, a
  syncing framework, webhook handling, and observability GitHub, supporting over
  400 APIs with 600+ pre-built integrations Y Combinator. 


  The platform takes a code-first approach where developers write integrations
  in TypeScript, keep them in their codebase, and test locally with Nango's CLI,
  while Nango handles the heavy lifting of OAuth flows, credential management,
  rate limiting, retries, and data synchronization in production. It's
  particularly useful for SaaS companies that need to integrate with common
  business tools like CRMs, calendars, and project management software, and it's
  available as both a cloud service and self-hosted open-source solution.
