aid: nango
name: Nango
description: Nango.dev is a developer infrastructure platform that simplifies building product integrations
  with external APIs. It provides the infrastructure to build reliable, scalable integrations fast, including
  API authentication, a syncing framework, webhook handling, and observability, supporting over 400 APIs
  with 600+ pre-built integrations.
