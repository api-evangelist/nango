specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Nango
providerId: nango
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Integrations
  - iPaaS
  - OAuth
description: 'Nango per-API-connection + usage tiers: Free / Starter / Growth / Enterprise.'
sources:
  - https://www.nango.dev/pricing
plans:
  - id: nango-free
    name: Free
    type: freemium
    description: $0/mo; 10 API connections.
    entries:
      - label: API connections
        name: conns
        type: quota
        metric: connection
        limit: 10
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Proxy requests
        name: proxy
        type: quota
        metric: request
        limit: 100000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Function compute
        name: compute
        type: quota
        metric: hour
        limit: 10
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 100k function runs
      - name: 100k function logs
      - name: 100k sync storage records
      - name: 100k webhooks
      - name: 2 environments
  - id: nango-starter
    name: Starter
    type: paid
